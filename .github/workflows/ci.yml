# Runs on GitHub's servers automatically. Lints and builds the site
# on every push to main and every pull request.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest   
    steps:
      # 1. Pull your repo's code onto that machine
      - uses: actions/checkout@v4

      # 2. Install Node 20, and cache npm downloads so future runs are fast
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install deps exactly from package-lock.json (same as you ran locally)
      - run: npm ci

      # 4. The same two commands you just ran — now automated
      - run: npm run lint
      - run: npm run build

  deploy:
    needs: build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/adover/server/PersonalPortfolio/
    steps:
      - run: git pull
      - run: docker compose up -d --build