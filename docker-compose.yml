services:
  nextjs:
    build: .
    restart: unless-stopped
    expose:
      - "3005"
    networks:
      - public
  
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "444:444"
      # - "443:443"
    volumes:
      - ./portfolio.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/var/www/portfolio/static:ro
    depends_on:
      - nextjs
    networks:
      - public
  
networks:
  public:
    external: true