# Runs on GitHub's servers automatically. Lints and builds the site
# on every push to main and every pull request.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest   
    steps:
      # 1. Pull your repo's code onto that machine
      - uses: actions/checkout@v4

      # 2. Install Node 20, and cache npm downloads so future runs are fast
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install deps exactly from package-lock.json (same as you ran locally)
      - run: npm ci

      # 4. Lint, type-check, build, and audit dependencies
      - run: npm run lint
      - run: npx tsc --noEmit                  # type-check — catches TS errors the build can skip
      - run: npm run build
      - run: npm audit --audit-level=high      # flag vulnerable deps
        continue-on-error: true                # report only for now (you have existing vulns — Dependabot will fix over time)

  deploy:
    needs: [build, ticket-check, security]                # ← deploy now BLOCKS on an open critical ticket
    if: github.ref == 'refs/heads/master'       # master only, never on PRs
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/adover/server/PersonalPortfolio/
    steps:
      - run: git pull
      - run: docker compose up -d --build
      # Verify the app actually responds — "deployed" != "working".
      # Hits the Next.js container directly (no nginx Host-header rules in the way).
      - name: Health check
        run: |
          sleep 5
          docker run --rm --network public curlimages/curl:latest -fsS http://nextjs:3005 > /dev/null

  verify:
    needs: deploy
    if: github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      # Monitoring-verified deploy: confirm the blackbox probe is green —
      # not just a one-off curl, but what your alerting actually sees.
      - name: Confirm blackbox probe is green
        run: |
          sleep 20   # wait >=1 Prometheus scrape so probe_success reflects the NEW deploy
          UP=$(docker run --rm --network proxy curlimages/curl:latest -fsG \
                 'http://prometheus:9090/api/v1/query' \
                 --data-urlencode 'query=probe_success{instance="http://nginx:444"}' \
               | jq -r '.data.result[0].value[1] // "0"')
          echo "probe_success=$UP"
          [ "$UP" = "1" ] || { echo "::error::blackbox says the site is DOWN after deploy"; exit 1; }

  rollback:
    needs: [deploy, verify]
    if: failure() && github.ref == 'refs/heads/master'   # deploy or verify failed → auto-revert
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/adover/server/PersonalPortfolio/
    steps:
      # Revert to the previous commit (HEAD~1 = the commit before this push) and redeploy.
      - run: git reset --hard HEAD~1 && docker compose up -d --build

  notify:
    needs: [build, deploy, verify]
    if: always() && github.ref == 'refs/heads/master'   # report every real deploy, pass or fail
    runs-on: ubuntu-latest
    steps:
      - run: |
          STATUS="${{ (needs.build.result == 'success' && needs.deploy.result == 'success' && needs.verify.result == 'success') && '✅ verified healthy' || '❌ failed' }}"
          curl -H "Content-Type: application/json" -d "{
            \"content\": \"**Portfolio CI/CD** $STATUS\n${{ github.actor }} pushed \`${{ github.sha }}\`\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>\"
          }" "${{ secrets.DISCORD_WEBHOOK }}"
  ticket-check:
    if: github.ref == 'refs/heads/master'   # runs in parallel with build → fails fast on a freeze
    runs-on: ubuntu-latest
    steps:
      - run: |
          COUNT=$(gh issue list --repo ${{ github.repository }} --label critical --state open --json number -q 'length')
          [ "$COUNT" -eq 0 ] || { echo "::error::$COUNT open critical ticket(s) — blocking deploy"; exit 1; }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                    # full history so gitleaks can scan past commits
      - uses: gitleaks/gitleaks-action@v2   # scan for committed secrets/keys
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}